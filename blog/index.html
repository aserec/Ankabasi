<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog de Ankabasi — Historias, memorias y sabiduría desde la Sierra Nevada de Santa Marta">
    <title>Blog — Ankabasi</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../images/logo/favicon-32.png">
    <link rel="apple-touch-icon" href="../images/logo/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

            <div class="nav__menu" id="nav-menu">

                    <li class="nav__item"><a href="../index.html#experiencia" class="nav__link" data-i18n="nav.experiencia">Experiencia</a></li>

                    <li class="nav__item"><a href="../index.html#donde" class="nav__link" data-i18n="nav.donde">Dónde</a></li>
                    <li class="nav__item"><a href="../index.html#contacto" class="nav__link" data-i18n="nav.contacto">Contacto</a></li>
                </ul>
                <div class="nav__mundo">
                    <span class="nav__mundo-label" data-i18n="nav.mundoAnkabasi">Mundo Ankabasi</span>
                    <ul class="nav__mundo-list">
                        <li class="nav__item nav__item--mundo">
                            <a href="index.html" class="nav__link nav__link--mundo active" data-i18n="nav.blog">Blog</a>
                        </li>
                        <li class="nav__item nav__item--mundo">
                            <a href="../libro/index.html" class="nav__link nav__link--mundo" data-i18n="nav.libro">Libro</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="nav__actions">
                <a href="../index.html#contacto" class="btn btn--primary" data-i18n="nav.reservar">Reservar ahora</a>
                <div class="lang-switcher">
                    <label class="sr-only" for="lang-select" data-i18n="a11y.langNav">Idioma</label>
                    <select id="lang-select" class="lang-switcher__select">
                        <option value="es">ES</option>
                        <option value="en">EN</option>
                        <option value="de">DE</option>
                        <option value="fr">FR</option>
                    </select>
                </div>
                <div class="nav__toggle" id="nav-toggle">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <header class="blog-page__header">
                <h1 class="section__title" data-aos="fade-up" data-i18n="blog.title">Blog</h1>
                <div class="section__underline" data-aos="fade-up"></div>
                <p class="section__subtitle" data-aos="fade-up" data-i18n="blog.subtitle">

                </p>
            </header>
            <div id="blog-list" class="blog-list" data-read-more-key="blog.readMore" data-in-blog-folder="true"></div>

        <div class="container">
            <div class="footer__bottom">
                <p data-i18n="footer.copy">&copy; 2026 Ankabasi. Todos los derechos reservados.</p>

        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog-data.js"></script>
    <script src="../js/blog-content.js"></script>
